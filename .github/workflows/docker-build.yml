name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: control-plane
            dockerfile: packages/control-plane/Dockerfile
          - name: web
            dockerfile: packages/web/Dockerfile
          - name: slack-bot
            dockerfile: packages/slack-bot/Dockerfile
          - name: github-bot
            dockerfile: packages/github-bot/Dockerfile
          - name: linear-bot
            dockerfile: packages/linear-bot/Dockerfile
          - name: sandbox-manager
            dockerfile: packages/sandbox-manager/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/open-inspect-${{ matrix.service.name }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/open-inspect-${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update ECS services
        run: |
          SERVICES="control-plane web sandbox-manager"
          CLUSTER="${{ secrets.ECS_CLUSTER_NAME }}"

          for SERVICE in $SERVICES; do
            echo "Updating open-inspect-${SERVICE}..."
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "open-inspect-${SERVICE}" \
              --force-new-deployment \
              --no-cli-pager || echo "Service open-inspect-${SERVICE} not found, skipping"
          done
