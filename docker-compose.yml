services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: openinspect
      POSTGRES_USER: openinspect
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openinspect}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openinspect"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Database Migrations ────────────────────────────────────────────────────

  migrate:
    build:
      context: .
      dockerfile: packages/control-plane/Dockerfile
    command: ["npx", "tsx", "packages/control-plane/migrations/run.ts"]
    environment:
      DATABASE_URL: postgres://openinspect:${POSTGRES_PASSWORD:-openinspect}@postgres:5432/openinspect
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Control Plane ──────────────────────────────────────────────────────────

  control-plane:
    build:
      context: .
      dockerfile: packages/control-plane/Dockerfile
    ports:
      - "8787:8787"
    environment:
      DATABASE_URL: postgres://openinspect:${POSTGRES_PASSWORD:-openinspect}@postgres:5432/openinspect
      REDIS_URL: redis://redis:6379
      PORT: "8787"
      DEPLOYMENT_NAME: docker
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      REPO_SECRETS_ENCRYPTION_KEY: ${REPO_SECRETS_ENCRYPTION_KEY}
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID}
      MODAL_API_SECRET: ${MODAL_API_SECRET}
      MODAL_WORKSPACE: ${MODAL_WORKSPACE}
      WORKER_URL: http://control-plane:8787
      WEB_APP_URL: http://localhost:3000
      EXTRA_MODELS: ${EXTRA_MODELS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ─── Web Dashboard ──────────────────────────────────────────────────────────

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      CONTROL_PLANE_URL: http://control-plane:8787
      NEXT_PUBLIC_WS_URL: ws://localhost:8787
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET}
      EXTRA_MODELS: ${EXTRA_MODELS:-}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS}
      ALLOWED_USERS: ${ALLOWED_USERS}
    depends_on:
      - control-plane

  # ─── Sandbox Manager ────────────────────────────────────────────────────────

  sandbox-manager:
    build:
      context: .
      dockerfile: packages/sandbox-manager/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONTROL_PLANE_URL: http://control-plane:8787
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENCODE_USER_CONFIG: ${OPENCODE_USER_CONFIG:-}
      SANDBOX_NETWORK: open-inspect_default
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - control-plane

  # ─── Bots (optional) ────────────────────────────────────────────────────────

  slack-bot:
    build:
      context: .
      dockerfile: packages/slack-bot/Dockerfile
    ports:
      - "3001:3001"
    environment:
      REDIS_URL: redis://redis:6379
      CONTROL_PLANE_URL: http://control-plane:8787
      WEB_APP_URL: http://localhost:3000
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - control-plane
      - redis
    profiles:
      - bots

  github-bot:
    build:
      context: .
      dockerfile: packages/github-bot/Dockerfile
    ports:
      - "3002:3002"
    environment:
      REDIS_URL: redis://redis:6379
      CONTROL_PLANE_URL: http://control-plane:8787
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET}
      GITHUB_BOT_USERNAME: ${GITHUB_BOT_USERNAME}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - control-plane
      - redis
    profiles:
      - bots

  linear-bot:
    build:
      context: .
      dockerfile: packages/linear-bot/Dockerfile
    ports:
      - "3003:3003"
    environment:
      REDIS_URL: redis://redis:6379
      CONTROL_PLANE_URL: http://control-plane:8787
      WEB_APP_URL: http://localhost:3000
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET}
      LINEAR_CLIENT_ID: ${LINEAR_CLIENT_ID}
      LINEAR_CLIENT_SECRET: ${LINEAR_CLIENT_SECRET}
      LINEAR_WEBHOOK_SECRET: ${LINEAR_WEBHOOK_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - control-plane
      - redis
    profiles:
      - bots

volumes:
  pgdata:
